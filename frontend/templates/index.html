<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteSync AI - Food Recommendations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🥗 BiteSync AI</h1>
            <p>Smart food recommendations tailored to your health goals</p>
        </header>

        <main>
            <section class="controls">
                <div class="form-group">
                    <label for="goal">Select Your Goal</label>
                    <select id="goal" required>
                        <option value="" disabled selected>-- Choose a goal --</option>
                        <option value="weight_loss">Weight Loss</option>
                        <option value="weight_gain">Weight Gain</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="diet">Diet Preference</label>
                    <select id="diet">
                        <option value="all" selected>All</option>
                        <option value="veg">Vegetarian</option>
                        <option value="non-veg">Non-Vegetarian</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="sort">Sort By</label>
                    <select id="sort">
                        <option value="" selected>Default</option>
                        <option value="calories">Calories (Low to High)</option>
                        <option value="protein">Protein (Low to High)</option>
                    </select>
                </div>

                <button id="recommendBtn" onclick="getRecommendations()">Get Recommendations</button>
            </section>

            <section id="results" class="results hidden">
                <h2>Your Recommendations</h2>
                <div id="cards" class="cards-grid"></div>
            </section>

            <section id="error" class="error hidden">
                <p id="errorMsg"></p>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 BiteSync AI. Built for better health.</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
